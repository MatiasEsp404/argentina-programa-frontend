<div class="container" style="display: flex; flex-direction: row-reverse;" *ngIf="btnLoginDisabled">
  <button class="btn btn-primary mb-3 mt-4" (click)="disableLogin()">Login</button>
</div>

<div style="display: flex; align-items: center; justify-content: center; flex-direction: column; flex-wrap: wrap;"
  class="mb-3"
  *ngIf="loginDisabled">
  <form style="max-width: 50%;">
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Usuario</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="exampleInputPassword1">
    </div>
    <button type="button" class="btn btn-primary" (click)="loggedIn()">Submit</button>
  </form>

</div>

<div class="container" style="display: flex; flex-direction: row-reverse;" *ngIf="logged">
  <button class="btn btn-primary mb-3 mt-4" (click)="editInfo()" >Editar</button>
</div>

<div style="display: flex; align-items: center; justify-content: center; flex-direction: column; flex-wrap: wrap;"
  class="mb-3"
  *ngIf="btnEdit">
  <form style="max-width: 50%;">
    <div class="mb-3">
      <label for="exampleInputName1" class="form-label">Nombre</label>
      <input type="text" class="form-control" id="exampleInputName1">
    </div>
    <div class="mb-3">
      <label for="exampleInputLastName1" class="form-label">Apellido</label>
      <input type="text" class="form-control" id="exampleInputLastName1">
    </div>
    <div class="mb-3">
      <label for="exampleInputEmail2" class="form-label">Email</label>
      <input type="email" class="form-control" id="exampleInputEmail2">
    </div>
    <div class="mb-3">
      <label for="exampleInputLinkedin1" class="form-label">Linkedin</label>
      <input type="text" class="form-control" id="exampleInputLinkedin1">
    </div>
    <div class="mb-3">
      <label for="exampleInputGithub1" class="form-label">GitHub</label>
      <input type="text" class="form-control" id="exampleInputGithub1">
    </div>
    <div class="mb-3">
      <label for="exampleInputCountry1" class="form-label">País</label>
      <input type="text" class="form-control" id="exampleInputCountry1">
    </div>
    <div class="mb-3">
      <label for="exampleInputProvince1" class="form-label">Provincia</label>
      <input type="text" class="form-control" id="exampleInputProvince1">
    </div>
    <div class="mb-3">
      <label for="exampleInputLocation1" class="form-label">Dirección</label>
      <input type="text" class="form-control" id="exampleInputLocation1">
    </div>
    <div class="mb-3">
      <label for="exampleInputPhoneNumber1" class="form-label">Número de Teléfono</label>
      <input type="text" class="form-control" id="exampleInputPhoneNumber1">
    </div>
    <div class="mb-3">
      <label for="exampleInputSeniority1" class="form-label">Seniority</label>
      <input type="text" class="form-control" id="exampleInputSeniority1">
    </div>
    <div class="mb-3">
      <label for="exampleInputProfilePicture1" class="form-label">Imágen de Perfil</label>
      <input type="text" class="form-control" id="exampleInputProfilePicture1">
    </div>
    <div class="mb-3">
      <label for="exampleInputCoverImage1" class="form-label">Imágen de Portada</label>
      <input type="text" class="form-control" id="exampleInputCoverImage1">
    </div>
    <button type="button" class="btn btn-primary" (click)="loggedIn()">Confirmar</button>
  </form>

</div>

<aside style="border: 2px solid red">
  <p class="h3">
    Cosas que faltan:
  </p>
  <p>
    Hola Claudio! Estamos corrigiendo tu trabajo integrado y hemos notado que el login no está para poder editar
    componentes, además faltan componentes como educación y proyectos. Será que podes agregar lo que falta por favor?
    Tenés tiempo hasta el 20/11. Saludos!
  </p>
</aside>
