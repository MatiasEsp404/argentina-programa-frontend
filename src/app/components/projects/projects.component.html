<div class="projectsContainer">
  <p class="h4">Proyectos:</p>
  <div>
    <ul>
      <li *ngFor="let p of project">
        <span class="h5">{{p.name}}</span>
        <br>
        {{p.description}}
        <br>
        <a [href]="p.url" target="_blank">{{p.url}}</a>
        <hr>
      </li>
    </ul>
  </div>
</div>
